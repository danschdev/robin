repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.12
  hooks:
  - id: ruff-check
    name: Ruff checker
    description: This hook checks and static analysis and linting
  - id: ruff-format
    name: Ruff formatter
    description: Formats code
- repo: https://github.com/RobertCraigie/pyright-python
  rev: v1.1.409
  hooks:
  - id: pyright
    name: Pyright
    description: Static type checking
    additional_dependencies: [pandas, requests]